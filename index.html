<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود امن</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:tahoma;
    color:white;
}

#loginBox,#secretPage{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,255,255,.3);
}

input{
    padding:12px;
    width:220px;
    border:none;
    border-radius:8px;
    margin:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#06b6d4;
    color:white;
    cursor:pointer;
}

#secretPage{
    display:none;
}
</style>
</head>
<body>

<div id="loginBox">
    <h2>ورود به سیستم</h2>
    <input type="password" id="pass" placeholder="رمز عبور">
    <br>
    <button onclick="login()">ورود</button>
    <p id="error"></p>
</div>

<div id="secretPage">
    <h1>🔒 پیام مخفی</h1>
    <p>
        اینجا متن محرمانه شما قرار می‌گیرد.
    </p>
</div>

<script>
const PASSWORD = "11228";

function login(){
    const p = document.getElementById("pass").value;

    if(p === PASSWORD){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("secretPage").style.display="block";
    }else{
        document.getElementById("error").innerHTML="رمز اشتباه است";
    }
}
</script>

</body>
</html>
