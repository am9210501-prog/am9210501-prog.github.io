<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه شخصی من</title>

    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            max-width: 600px;
        }

        h1 {
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .clock {
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .date {
            font-size: 1.2rem;
            color: #cbd5e1;
        }

        p {
            margin-top: 25px;
            line-height: 1.8;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>به وب‌سایت من خوش آمدید</h1>

    <div class="clock" id="clock">00:00:00</div>

    <div class="date" id="date">در حال بارگذاری...</div>

    <p>
        این صفحه با GitHub Pages میزبانی شده است.
        اینجا می‌توانید پروژه‌ها، ایده‌ها و دستاوردهای خود را به اشتراک بگذارید.
    </p>
</div>

<script>
function updateTime() {
    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("fa-IR");

    document.getElementById("date").innerHTML =
        now.toLocaleDateString("fa-IR", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
        });
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
