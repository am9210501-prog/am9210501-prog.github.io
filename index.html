<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    font-family:tahoma,sans-serif;
}

.box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:320px;
}

h1{
    color:#2575fc;
}

input{
    width:90%;
    padding:12px;
    margin-top:10px;
    border:2px solid #2575fc;
    border-radius:10px;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#2575fc;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d5fd1;
}

#result{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
    <h1>م؟</h1>
    <p>رمز بزن داشی😁🤫</p>

    <input type="password" id="password" placeholder="رمز عبور">
    <br>
    <button onclick="checkPassword()">ورود</button>

    <div id="result"></div>
</div>

<script>
function checkPassword() {
    let pass = document.getElementById("password").value;

    if(pass === "11228"){
        document.getElementById("result").innerHTML =
            "<span style='color:green'>✅ ورود موفقیت‌آمیز بود</span>";
    } else {
        document.getElementById("result").innerHTML =
            "<span style='color:red'>❌ رمز اشتباه است</span>";
    }
}
</script>

</body>
</html>
